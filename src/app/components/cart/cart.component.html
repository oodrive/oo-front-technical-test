<div class="cart-container" *ngIf="selectedProducts().length > 0; else emptyCart">
	<ul class="cart-items">
		<li class="cart-item" *ngFor="let item of selectedProducts()">
			<div class="item-content">
				<div class="item-image">
					<img [src]="item.image" [alt]="item.name" />
				</div>
				<div class="item-details">
					<h4 class="item-name">{{ item.name }}</h4>
					<p class="item-price">${{ item.price }}</p>
				</div>
				<button class="remove-btn" (click)="removeFromCart(item.id)" aria-label="Supprimer du panier">
					<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
						<line x1="18" y1="6" x2="6" y2="18"></line>
						<line x1="6" y1="6" x2="18" y2="18"></line>
					</svg>
				</button>
			</div>
			<p class="item-description">{{ item.description }}</p>
		</li>
	</ul>

	<div class="cart-summary">
		<div class="summary-row">
			<span>Sous-total</span>
			<span>{{ selectedProducts() | totalPrice }}$</span>
		</div>
		<div class="summary-row">
			<span>Articles</span>
			<span>{{ selectedProducts().length }}</span>
		</div>
		<div class="summary-row total">
			<span>Total</span>
			<span>{{ selectedProducts() | totalPrice }}$</span>
		</div>
	</div>

	<div class="cart-actions">
		<button class="checkout-btn">
			Passer commande
		</button>
		<button class="clear-btn" (click)="clearCart()">
			Vider le panier
		</button>
	</div>
</div>

<ng-template #emptyCart>
	<div class="empty-cart">
		<svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1" fill="none">
			<circle cx="9" cy="21" r="1"></circle>
			<circle cx="20" cy="21" r="1"></circle>
			<path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
		</svg>
		<p>Votre panier est vide</p>
		<p>Parcourez nos produits pour commencer vos achats</p>
	</div>
</ng-template>
