<header class="header">
	<div class="container">
		<div class="logo">
			<img src="oodrive-logo.png" alt="Oodrive Logo" class="logo-img">
			<h1>Oodrive</h1>
		</div>

		<nav class="nav">
			<ul class="nav-list">
				<li><a routerLink="/home" routerLinkActive="active" class="nav-link">Home</a></li>
				<li><a href="#about" class="nav-link">About</a></li>
				<li><a href="#services" class="nav-link">Services</a></li>
				<li><a href="#contact" class="nav-link">Contact</a></li>
				<li><a href="#blog" class="nav-link">Blog</a></li>
			</ul>
		</nav>

		<div class="cart-section">
			<button class="cart-btn" (click)="toggleCart()" aria-label="Voir le panier">
				<svg class="cart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<circle cx="9" cy="21" r="1"></circle>
					<circle cx="20" cy="21" r="1"></circle>
					<path d="m1 1 4 4 2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
				</svg>
				<span class="cart-count">{{ cartItemCount$ | async }}</span>
			</button>
		</div>
	</div>
</header>

<!-- Remplacer le modal par une sidebar -->
<div class="cart-sidebar-overlay" [class.show]="isCartOpen" (click)="closeCart()">
  <div class="cart-sidebar" (click)="$event.stopPropagation()">
    <div class="cart-header">
      <h3>Mon Panier</h3>
      <button class="close-btn" (click)="closeCart()" aria-label="Fermer le panier">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="cart-content">
      <app-cart [selectedProducts]="selectedProducts" />
    </div>
  </div>
</div>
