<button class="btn btn-secondary" (click)="goBack()">Back</button>
<form [formGroup]="productForm" (ngSubmit)="submit()">
	<div>
		<label for="id">ID:</label>
		<input type="number" id="id" formControlName="id" readonly>
	</div>

	<div>
		<label for="name">Name:</label>
		<input type="text" id="name" formControlName="name" required
		[class.invalid]="productForm.get('name')?.invalid && productForm.get('name')?.touched">
	</div>

	<div>
		<label for="description">Description:</label>
		<textarea id="description" formControlName="description" required></textarea>
	</div>

	<div>
		<label for="price">Price:</label>
		<input type="number" id="price" formControlName="price" step="0.01" required>
	</div>

	<div>
		<label for="image">Image URL:</label>
		<input type="url" id="image" formControlName="image" required>
	</div>

	<button type="submit" [disabled]="productForm.invalid" [class.disabled]="productForm.invalid">Save Product</button>
</form>
